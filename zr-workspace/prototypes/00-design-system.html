<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=390,initial-scale=1,maximum-scale=1"/>
<title>ZR Securities — Design System Components</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --brand-blue: #1A73E8;
  --brand-blue-hover: #4A90D9;
  --brand-blue-dark: #1557B0;
  --brand-blue-bg: #E8F0FE;
  --success: #00C853;
  --error: #FF1744;
  --warning: #FFB300;
  --info: #29B6F6;
  --bg-primary: #FFFFFF;
  --bg-secondary: #F5F5F5;
  --bg-tertiary: #EEEEEE;
  --text-primary: #212121;
  --text-secondary: #757575;
  --text-tertiary: #BDBDBD;
  --border: #E0E0E0;
  --divider: #F0F0F0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #F5F5F5; max-width: 390px; margin: 0 auto; }
.mono { font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ========= COMPONENTS ========= */

// 1. Primary Button
function PrimaryButton({ children, variant = 'default', disabled = false, onClick }) {
  const bgMap = { default: '#1A73E8', buy: '#00C853', sell: '#FF1744' };
  const bg = disabled ? '#E5E5EA' : bgMap[variant];
  const color = disabled ? '#BDBDBD' : '#FFFFFF';
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      style={{ height: 52, width: '100%', background: bg, color, border: 'none', borderRadius: 26, fontSize: 17, fontWeight: 600, fontFamily: 'Inter', cursor: disabled ? 'default' : 'pointer', transition: 'opacity 0.15s' }}
      onMouseDown={e => !disabled && (e.target.style.opacity = '0.95')}
      onMouseUp={e => e.target.style.opacity = '1'}
    >
      {children}
    </button>
  );
}

// 2. Secondary Button
function SecondaryButton({ children, active = false, onClick }) {
  return (
    <button onClick={onClick} style={{
      height: 36, padding: '0 16px', background: 'transparent',
      border: `1px solid ${active ? '#1A73E8' : '#E0E0E0'}`,
      borderRadius: 8, fontSize: 14, fontWeight: 500, color: active ? '#1A73E8' : '#212121',
      cursor: 'pointer', fontFamily: 'Inter'
    }}>
      {children}
    </button>
  );
}

// 3. Text Input
function TextInput({ label, placeholder, error, value, onChange }) {
  const [focused, setFocused] = useState(false);
  return (
    <div style={{ width: '100%' }}>
      {label && <div style={{ fontSize: 13, color: '#757575', marginBottom: 4, fontFamily: 'Inter' }}>{label}</div>}
      <input
        value={value} onChange={onChange} placeholder={placeholder}
        onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
        style={{
          height: 48, width: '100%', padding: '0 12px',
          background: focused ? '#FFFFFF' : '#F5F5F5',
          border: `${error ? 2 : focused ? 2 : 1}px solid ${error ? '#FF1744' : focused ? '#1A73E8' : '#E0E0E0'}`,
          borderRadius: 8, fontSize: 15, fontFamily: 'Inter', outline: 'none', color: '#212121'
        }}
      />
      {error && <div style={{ fontSize: 12, color: '#FF1744', marginTop: 4 }}>{error}</div>}
    </div>
  );
}

// 4. Amount Input
function AmountInput({ value, unit = 'BTC', available = '0.5234', onChange }) {
  return (
    <div style={{ width: '100%' }}>
      <div style={{ display: 'flex', alignItems: 'center', height: 56, background: '#F5F5F5', borderRadius: 8, padding: '0 12px', border: '1px solid #E0E0E0' }}>
        <input value={value} onChange={onChange} placeholder="0.00" style={{
          flex: 1, border: 'none', background: 'transparent', fontSize: 28, fontWeight: 600,
          fontFamily: 'JetBrains Mono', outline: 'none', color: '#212121'
        }}/>
        <span style={{ color: '#1A73E8', fontSize: 14, fontWeight: 600, cursor: 'pointer', marginRight: 8 }}>Max</span>
        <span style={{ fontSize: 15, color: '#757575', fontWeight: 500 }}>{unit}</span>
      </div>
      <div style={{ fontSize: 13, color: '#757575', marginTop: 4, fontFamily: 'Inter' }}>可用余额: <span className="mono">{available} {unit}</span></div>
    </div>
  );
}

// 5. OTP Input
function OTPInput() {
  const [digits, setDigits] = useState(['', '', '', '', '', '']);
  const [activeIdx, setActiveIdx] = useState(0);
  return (
    <div style={{ display: 'flex', gap: 8, justifyContent: 'center' }}>
      {digits.map((d, i) => (
        <div key={i} style={{
          width: 56, height: 56, borderRadius: 8,
          border: `${i === activeIdx ? 2 : 1}px solid ${i === activeIdx ? '#1A73E8' : '#E0E0E0'}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 20, fontFamily: 'JetBrains Mono', fontWeight: 600, color: '#212121',
          background: '#FFFFFF', position: 'relative'
        }}>
          {d || (i === activeIdx && <div style={{ width: 2, height: 30, background: '#1A73E8', animation: 'blink 1s infinite' }}/>)}
        </div>
      ))}
      <style>{`@keyframes blink { 0%,50% { opacity:1 } 51%,100% { opacity:0 } }`}</style>
    </div>
  );
}

// 6. Exchange Badge
function ExchangeBadge({ exchange }) {
  const map = {
    HashKey: { bg: '#E8EEFF', color: '#2962FF' },
    Bullish: { bg: '#E0F7F0', color: '#00BFA5' },
    OSL: { bg: '#FFF3E0', color: '#FF6D00' },
    VDX: { bg: '#EDE7F6', color: '#7C4DFF' },
  };
  const s = map[exchange] || map.HashKey;
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', height: 20, padding: '0 8px', borderRadius: 10, background: s.bg, color: s.color, fontSize: 12, fontWeight: 500, fontFamily: 'Inter' }}>
      {exchange}
    </span>
  );
}

// 7. Asset Class Switcher
function AssetClassSwitcher() {
  const [active, setActive] = useState(0);
  const items = ['加密', '股票', '外汇', '商品'];
  return (
    <div style={{ display: 'flex', height: 44, background: '#F5F5F5', borderRadius: 8, padding: 4, gap: 4 }}>
      {items.map((item, i) => (
        <button key={i} onClick={() => setActive(i)} style={{
          flex: 1, border: 'none', borderRadius: 8, fontSize: 14, fontWeight: 600, fontFamily: 'Inter',
          background: i === active ? '#1A73E8' : 'transparent',
          color: i === active ? '#FFFFFF' : '#757575',
          cursor: 'pointer', transition: 'all 0.3s ease-in-out'
        }}>
          {item}
        </button>
      ))}
    </div>
  );
}

// 8. Market Row
function MarketRow({ symbol, name, exchange, price, change, positive }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', height: 64, padding: '0 16px', borderBottom: '1px solid #F0F0F0', background: '#FFFFFF' }}>
      <div style={{ width: 36, height: 36, borderRadius: '50%', background: '#E0E0E0', marginRight: 12, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, fontWeight: 700, color: '#757575' }}>
        {symbol.charAt(0)}
      </div>
      <div style={{ flex: 1 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <span style={{ fontSize: 15, fontWeight: 700, color: '#212121' }}>{symbol}</span>
          <ExchangeBadge exchange={exchange}/>
        </div>
        <div style={{ fontSize: 13, color: '#757575' }}>{name}</div>
      </div>
      <div style={{ textAlign: 'right' }}>
        <div style={{ fontSize: 15, fontFamily: 'JetBrains Mono', fontWeight: 600, color: '#212121' }}>${price}</div>
        <div style={{
          display: 'inline-flex', alignItems: 'center', height: 22, padding: '0 8px', borderRadius: 11,
          background: positive ? '#E8F5E9' : '#FFEBEE',
          color: positive ? '#00C853' : '#FF1744',
          fontSize: 13, fontFamily: 'JetBrains Mono', fontWeight: 600
        }}>
          {positive ? '+' : ''}{change}%
        </div>
      </div>
    </div>
  );
}

// 9. Status Badge
function StatusBadge({ status }) {
  const map = {
    completed: { bg: '#E8F5E9', color: '#2E7D32', text: '已完成' },
    pending: { bg: '#FFF8E1', color: '#F57F17', text: '处理中' },
    failed: { bg: '#FFEBEE', color: '#C62828', text: '失败' },
  };
  const s = map[status] || map.pending;
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', height: 24, padding: '0 8px', borderRadius: 12, background: s.bg, color: s.color, fontSize: 12, fontWeight: 500 }}>
      {s.text}
    </span>
  );
}

// 10. Bottom Sheet
function BottomSheet({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 100 }}>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.5)' }}/>
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0,
        background: '#FFFFFF', borderRadius: '16px 16px 0 0', padding: 16, paddingBottom: 34,
        animation: 'slideUp 0.4s ease-out'
      }}>
        <div style={{ width: 36, height: 4, background: '#BDBDBD', borderRadius: 2, margin: '0 auto 16px' }}/>
        {title && <div style={{ fontSize: 17, fontWeight: 600, marginBottom: 16 }}>{title}</div>}
        {children}
      </div>
      <style>{`@keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }`}</style>
    </div>
  );
}

// 11. Cooling-Off Modal
function CoolingOffModal({ open, onClose, seconds = 28 }) {
  const [remaining, setRemaining] = useState(seconds);
  React.useEffect(() => {
    if (!open) { setRemaining(seconds); return; }
    const t = setInterval(() => setRemaining(r => r <= 1 ? (clearInterval(t), 0) : r - 1), 1000);
    return () => clearInterval(t);
  }, [open]);
  if (!open) return null;
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.6)' }}/>
      <div style={{ position: 'relative', width: 320, background: '#FFF', borderRadius: 16, padding: 24, textAlign: 'center' }}>
        <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 8 }}>交易冷静期</div>
        <div style={{ fontSize: 14, color: '#757575', marginBottom: 20 }}>
          此笔订单超过您投资组合的 20%。请在冷静期结束后确认交易。
        </div>
        <div style={{ fontSize: 48, fontWeight: 700, fontFamily: 'JetBrains Mono', color: '#FF1744', marginBottom: 20 }}>
          {remaining}s
        </div>
        <div style={{ display: 'flex', gap: 12 }}>
          <button onClick={onClose} style={{ flex: 1, height: 48, border: '1px solid #E0E0E0', borderRadius: 12, background: '#FFF', fontSize: 15, fontWeight: 600, cursor: 'pointer' }}>取消</button>
          <button disabled={remaining > 0} style={{
            flex: 1, height: 48, border: 'none', borderRadius: 12,
            background: remaining > 0 ? '#E5E5EA' : '#FF1744', color: remaining > 0 ? '#BDBDBD' : '#FFF',
            fontSize: 15, fontWeight: 600, cursor: remaining > 0 ? 'default' : 'pointer'
          }}>
            {remaining > 0 ? `等待 ${remaining}s` : '确认交易'}
          </button>
        </div>
        <div style={{ fontSize: 11, color: '#BDBDBD', marginTop: 12 }}>根据香港SFC投资者保护规则</div>
      </div>
    </div>
  );
}

// 12. Tab Bar
function TabBar({ activeTab = 0 }) {
  const items = [
    { label: '首页', icon: '🏠' },
    { label: '行情', icon: '📊' },
    { label: '交易', icon: '💱' },
    { label: '资产', icon: '💰' },
    { label: '更多', icon: '⋯' },
  ];
  return (
    <div style={{ display: 'flex', height: 83, background: '#FFF', borderTop: '1px solid #F0F0F0', paddingBottom: 34 }}>
      {items.map((item, i) => (
        <div key={i} style={{
          flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2,
          color: i === activeTab ? '#1A73E8' : '#BDBDBD', cursor: 'pointer'
        }}>
          <span style={{ fontSize: 24 }}>{item.icon}</span>
          <span style={{ fontSize: 11, fontWeight: 500 }}>{item.label}</span>
        </div>
      ))}
    </div>
  );
}

/* ========= SHOWCASE APP ========= */
function App() {
  const [sheet, setSheet] = useState(false);
  const [cooling, setCooling] = useState(false);
  const [inputVal, setInputVal] = useState('');
  const [amtVal, setAmtVal] = useState('');

  return (
    <div style={{ background: '#F5F5F5', minHeight: '100vh', paddingBottom: 100 }}>
      {/* Header */}
      <div style={{ background: '#1A73E8', padding: '59px 16px 20px', color: '#FFF' }}>
        <div style={{ fontSize: 24, fontWeight: 700 }}>ZR Securities</div>
        <div style={{ fontSize: 14, opacity: 0.8, marginTop: 4 }}>Design System Components v1.0</div>
      </div>

      <div style={{ padding: 16, display: 'flex', flexDirection: 'column', gap: 24 }}>
        {/* Section: Buttons */}
        <Section title="Buttons">
          <PrimaryButton>登录 ZR Securities</PrimaryButton>
          <div style={{ height: 8 }}/>
          <div style={{ display: 'flex', gap: 8 }}>
            <div style={{ flex: 1 }}><PrimaryButton variant="buy">买入</PrimaryButton></div>
            <div style={{ flex: 1 }}><PrimaryButton variant="sell">卖出</PrimaryButton></div>
          </div>
          <div style={{ height: 8 }}/>
          <PrimaryButton disabled>不可用</PrimaryButton>
          <div style={{ height: 8 }}/>
          <div style={{ display: 'flex', gap: 8 }}>
            <SecondaryButton>限价单</SecondaryButton>
            <SecondaryButton active>市价单</SecondaryButton>
            <SecondaryButton>止损单</SecondaryButton>
          </div>
        </Section>

        {/* Section: Inputs */}
        <Section title="Inputs">
          <TextInput label="邮箱地址" placeholder="输入邮箱" value={inputVal} onChange={e => setInputVal(e.target.value)}/>
          <div style={{ height: 12 }}/>
          <TextInput label="手机号码" placeholder="输入手机号" error="格式不正确"/>
          <div style={{ height: 12 }}/>
          <AmountInput value={amtVal} onChange={e => setAmtVal(e.target.value)}/>
        </Section>

        {/* Section: OTP */}
        <Section title="OTP 验证码">
          <OTPInput/>
        </Section>

        {/* Section: Asset Class Switcher */}
        <Section title="资产类别切换">
          <AssetClassSwitcher/>
        </Section>

        {/* Section: Exchange Badges */}
        <Section title="交易所标签">
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <ExchangeBadge exchange="HashKey"/>
            <ExchangeBadge exchange="Bullish"/>
            <ExchangeBadge exchange="OSL"/>
            <ExchangeBadge exchange="VDX"/>
          </div>
        </Section>

        {/* Section: Status Badges */}
        <Section title="状态标签">
          <div style={{ display: 'flex', gap: 8 }}>
            <StatusBadge status="completed"/>
            <StatusBadge status="pending"/>
            <StatusBadge status="failed"/>
          </div>
        </Section>

        {/* Section: Market Rows */}
        <Section title="行情列表行">
          <div style={{ borderRadius: 12, overflow: 'hidden' }}>
            <MarketRow symbol="BTC" name="Bitcoin" exchange="HashKey" price="67,234.50" change="2.34" positive={true}/>
            <MarketRow symbol="ETH" name="Ethereum" exchange="Bullish" price="3,456.80" change="1.52" positive={true}/>
            <MarketRow symbol="SOL" name="Solana" exchange="OSL" price="142.35" change="-1.23" positive={false}/>
          </div>
        </Section>

        {/* Section: Bottom Sheet & Cooling-Off */}
        <Section title="底部弹窗 & 冷静期">
          <div style={{ display: 'flex', gap: 8 }}>
            <div style={{ flex: 1 }}><PrimaryButton onClick={() => setSheet(true)}>底部弹窗</PrimaryButton></div>
            <div style={{ flex: 1 }}><PrimaryButton variant="sell" onClick={() => setCooling(true)}>冷静期弹窗</PrimaryButton></div>
          </div>
        </Section>

        {/* Section: Colors */}
        <Section title="色彩系统">
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8 }}>
            {[
              { name: 'Brand', c: '#1A73E8' }, { name: 'Success', c: '#00C853' },
              { name: 'Error', c: '#FF1744' }, { name: 'Warning', c: '#FFB300' },
              { name: 'HashKey', c: '#2962FF' }, { name: 'Bullish', c: '#00BFA5' },
              { name: 'OSL', c: '#FF6D00' }, { name: 'VDX', c: '#7C4DFF' },
            ].map(({ name, c }) => (
              <div key={name} style={{ textAlign: 'center' }}>
                <div style={{ width: '100%', height: 40, background: c, borderRadius: 8 }}/>
                <div style={{ fontSize: 11, color: '#757575', marginTop: 4 }}>{name}</div>
                <div style={{ fontSize: 10, fontFamily: 'JetBrains Mono', color: '#BDBDBD' }}>{c}</div>
              </div>
            ))}
          </div>
        </Section>

        {/* Section: Typography */}
        <Section title="字体层级">
          <div style={{ background: '#FFF', borderRadius: 12, padding: 16 }}>
            <div style={{ fontSize: 28, fontWeight: 700, marginBottom: 4 }}>Display 28px</div>
            <div style={{ fontSize: 24, fontWeight: 700, marginBottom: 4 }}>H1 24px Bold</div>
            <div style={{ fontSize: 20, fontWeight: 600, marginBottom: 4 }}>H2 20px Semi</div>
            <div style={{ fontSize: 17, fontWeight: 600, marginBottom: 4 }}>H3 17px Semi</div>
            <div style={{ fontSize: 15, marginBottom: 4 }}>Body 15px Regular</div>
            <div style={{ fontSize: 13, color: '#757575', marginBottom: 4 }}>Caption 13px</div>
            <div style={{ fontSize: 11, color: '#BDBDBD', letterSpacing: 1, textTransform: 'uppercase' }}>Overline 11px</div>
            <div style={{ marginTop: 8, fontFamily: 'JetBrains Mono' }}>
              <span style={{ fontSize: 20, fontWeight: 600 }}>$67,234.50</span>
              <span style={{ fontSize: 14, color: '#00C853', marginLeft: 8 }}>+2.34%</span>
            </div>
          </div>
        </Section>
      </div>

      {/* Tab Bar */}
      <div style={{ position: 'fixed', bottom: 0, left: '50%', transform: 'translateX(-50%)', width: 390, zIndex: 50 }}>
        <TabBar activeTab={1}/>
      </div>

      {/* Bottom Sheet */}
      <BottomSheet open={sheet} onClose={() => setSheet(false)} title="选择交易所">
        {['HashKey', 'Bullish', 'OSL', 'VDX'].map(ex => (
          <div key={ex} style={{ display: 'flex', alignItems: 'center', padding: '12px 0', borderBottom: '1px solid #F0F0F0', cursor: 'pointer' }}>
            <ExchangeBadge exchange={ex}/>
            <span style={{ marginLeft: 12, fontSize: 15, fontWeight: 500 }}>{ex} Exchange</span>
          </div>
        ))}
      </BottomSheet>

      {/* Cooling-Off Modal */}
      <CoolingOffModal open={cooling} onClose={() => setCooling(false)}/>
    </div>
  );
}

function Section({ title, children }) {
  return (
    <div>
      <div style={{ fontSize: 13, fontWeight: 600, color: '#757575', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>{title}</div>
      {children}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
